version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/docker/limbo"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/docker/velocity"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:40"
      timezone: "UTC"
    open-pull-requests-limit: 5
